# application-prod.yml

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: Asia/Seoul

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 40MB

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile, email
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope: profile_nickname, account_email
            client-name: Kakao

      provider:
        kakao:
          authorization-uri: https://kauth.kakao.com/oauth/authorize
          token-uri: https://kauth.kakao.com/oauth/token
          user-info-uri: https://kapi.kakao.com/v2/user/me
          user-name-attribute: id

uploads:
  rides:
    path: ${UPLOADS_PATH:/var/triprider/uploads/rides}

course:
  path: ${COURSE_PATH:classpath:/course}

tourapi:
  base-url: "https://apis.data.go.kr/B551011/KorService2"
  service-key: ${TOURAPI_SERVICE_KEY}

weather:
  api:
    base-url: "https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0"
    service-key: ${WEATHER_SERVICE_KEY}

google:
  api:
    key: ${GOOGLE_API_KEY}

googleai:
  api:
    key: ${GOOGLE_AI_KEY}

gemini:
  baseurl: "https://generativelanguage.googleapis.com"
  model: "gemini-2.5-flash"

logging:
  level:
    org.hibernate.SQL: info