# src/main/resources/application-prod.yml
server:
  port: ${SERVER_PORT:8080}
  # Nginx/Cloudflare 뒤에서 https 스킴/호스트/IP를 신뢰하여 사용
  forward-headers-strategy: framework

spring:
  datasource:
    # 우선순위: SPRING_DATASOURCE_URL > DB_URL
    url: ${SPRING_DATASOURCE_URL:${DB_URL}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD}}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate         # 운영에서는 validate 권장
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: Asia/Seoul

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 40MB

  flyway:
    # Flyway 스크립트 준비 여부에 맞게
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile, email
            # 프록시 환경에서는 {baseUrl} 사용이 가장 안전
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            # 필요 시 사용하는 값, Kakao는 client_secret 옵션
            client-secret: ${KAKAO_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope: profile_nickname, account_email
            client-name: Kakao
      provider:
        kakao:
          authorization-uri: https://kauth.kakao.com/oauth/authorize
          token-uri: https://kauth.kakao.com/oauth/token
          user-info-uri: https://kapi.kakao.com/v2/user/me
          user-name-attribute: id

uploads:
  rides:
    # EC2는 고정 경로 권장 (없으면 자동 생성하도록 코드에서 보조)
    path: ${UPLOADS_PATH:/var/triprider/uploads/rides}

course:
  # 배포 시에는 classpath 유지 또는 외부 경로/객체스토리지로 전환
  path: ${COURSE_PATH:classpath:/course}

tourapi:
  base-url: "https://apis.data.go.kr/B551011/KorService2"
  service-key: ${TOURAPI_SERVICE_KEY}

weather:
  api:
    base-url: "https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0"
    service-key: ${WEATHER_SERVICE_KEY}

logging:
  level:
    org.hibernate.SQL: info

googleai:
  api:
    key: "AIzaSyC2mSq6cYbYIVTMYWuF_FYvjblNPMQ_MkI"

gemini:
  baseurl: "https://generativelanguage.googleapis.com"
